<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AemoDev</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="splash-section">
        <div class="splash-container">
            <div class="logo">AemoDev</div>
            <div class="tagline">Creating Digital Excellence</div>
        </div>
    </section>

    <section class="extensions-section">
        <h2 class="section-title">Extensions</h2>
        <div class="card-container">
            <div class="card">
                <img src="/api/placeholder/400/300" alt="Extension 1" class="card-image">
                <div class="card-content">
                    <h3 class="card-title">Code Generator Pro</h3>
                    <p class="card-subtitle">Automate your coding workflow with AI-powered suggestions</p>
                </div>
            </div>

            <div class="card">
                <img src="/api/placeholder/400/300" alt="Extension 2" class="card-image">
                <div class="card-content">
                    <h3 class="card-title">Theme Manager</h3>
                    <p class="card-subtitle">Customize your IDE with beautiful, responsive themes</p>
                </div>
            </div>

            <div class="card">
                <img src="/api/placeholder/400/300" alt="Extension 3" class="card-image">
                <div class="card-content">
                    <h3 class="card-title">Smart Debugger</h3>
                    <p class="card-subtitle">Advanced debugging tools for modern development</p>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
