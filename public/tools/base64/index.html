<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encode & Decode - Aemo Developer Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #121212;
            --bg-tertiary: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-primary: #bb86fc;
            --accent-secondary: #03dac6;
            --border-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--accent-primary);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .tool-section {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-secondary);
            margin-bottom: 1.5rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 1.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        textarea, .file-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: 'Courier New', monospace;
        }

        textarea:focus, .file-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(187, 134, 252, 0.1);
        }

        .file-input {
            padding: 0.75rem 1rem;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            margin-right: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(187, 134, 252, 0.3);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .result {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            position: relative;
            max-height: 300px;
            overflow-y: auto;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: var(--accent-secondary);
        }

        .copy-btn.copied {
            background: #4caf50;
        }

        .file-info {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .title {
                font-size: 2rem;
            }

            .tabs {
                flex-direction: column;
                gap: 0;
            }

            .tab {
                border-bottom: 1px solid var(--border-color);
                border-radius: 0;
            }

            .tab.active {
                border-bottom-color: var(--accent-primary);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../" class="back-link">← Back to Tools</a>
        
        <div class="header">
            <h1 class="title">Base64 Encode & Decode</h1>
            <p class="subtitle">Convert text or files to and from Base64 encoding</p>
        </div>

        <div class="tool-section">
            <h2 class="section-title">Text Encoding</h2>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('encode')">Encode</button>
                <button class="tab" onclick="switchTab('decode')">Decode</button>
            </div>

            <!-- Encode Tab -->
            <div id="encodeTab" class="tab-content">
                <div class="input-group">
                    <label for="encodeInput">Enter text to encode:</label>
                    <textarea id="encodeInput" placeholder="Enter your text here..."></textarea>
                </div>

                <button class="btn" onclick="encodeText()">Encode</button>
                <button class="btn btn-secondary" onclick="clearEncode()">Clear</button>

                <div id="encodeResult" class="result hidden">
                    <button class="copy-btn" onclick="copyEncodeResult()">Copy</button>
                    <span id="encodeResultText"></span>
                </div>
            </div>

            <!-- Decode Tab -->
            <div id="decodeTab" class="tab-content hidden">
                <div class="input-group">
                    <label for="decodeInput">Enter Base64 to decode:</label>
                    <textarea id="decodeInput" placeholder="Enter Base64 string here..."></textarea>
                </div>

                <button class="btn" onclick="decodeText()">Decode</button>
                <button class="btn btn-secondary" onclick="clearDecode()">Clear</button>

                <div id="decodeResult" class="result hidden">
                    <button class="copy-btn" onclick="copyDecodeResult()">Copy</button>
                    <span id="decodeResultText"></span>
                </div>
            </div>
        </div>

        <div class="tool-section">
            <h2 class="section-title">File Encoding</h2>
            
            <div class="tabs">
                <button class="tab active" onclick="switchFileTab('fileEncode')">Encode File</button>
                <button class="tab" onclick="switchFileTab('fileDecode')">Decode File</button>
            </div>

            <!-- File Encode Tab -->
            <div id="fileEncodeTab" class="tab-content">
                <div class="input-group">
                    <label for="fileInput">Select file to encode:</label>
                    <input type="file" id="fileInput" class="file-input" onchange="handleFileSelect(event)">
                </div>

                <div id="fileInfo" class="file-info hidden"></div>

                <button class="btn" onclick="encodeFile()" id="encodeFileBtn" disabled>Encode File</button>
                <button class="btn btn-secondary" onclick="clearFile()">Clear</button>

                <div id="fileEncodeResult" class="result hidden">
                    <button class="copy-btn" onclick="copyFileEncodeResult()">Copy</button>
                    <span id="fileEncodeResultText"></span>
                </div>
            </div>

            <!-- File Decode Tab -->
            <div id="fileDecodeTab" class="tab-content hidden">
                <div class="input-group">
                    <label for="base64FileInput">Select Base64 file to decode:</label>
                    <input type="file" id="base64FileInput" class="file-input" onchange="handleBase64FileSelect(event)">
                </div>

                <div id="base64FileInfo" class="file-info hidden"></div>

                <button class="btn" onclick="decodeFile()" id="decodeFileBtn" disabled>Decode File</button>
                <button class="btn btn-secondary" onclick="clearBase64File()">Clear</button>

                <div id="fileDecodeResult" class="result hidden">
                    <button class="copy-btn" onclick="downloadDecodedFile()">Download</button>
                    <span id="fileDecodeResultText"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let selectedBase64File = null;

        function switchTab(tab) {
            // Hide all tabs
            document.getElementById('encodeTab').classList.add('hidden');
            document.getElementById('decodeTab').classList.add('hidden');
            
            // Remove active class from all tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            // Show selected tab and make it active
            if (tab === 'encode') {
                document.getElementById('encodeTab').classList.remove('hidden');
                document.querySelectorAll('.tab')[0].classList.add('active');
            } else {
                document.getElementById('decodeTab').classList.remove('hidden');
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
        }

        function switchFileTab(tab) {
            // Hide all file tabs
            document.getElementById('fileEncodeTab').classList.add('hidden');
            document.getElementById('fileDecodeTab').classList.add('hidden');
            
            // Remove active class from all file tabs
            document.querySelectorAll('.tool-section:last-child .tab').forEach(t => t.classList.remove('active'));
            
            // Show selected tab and make it active
            if (tab === 'fileEncode') {
                document.getElementById('fileEncodeTab').classList.remove('hidden');
                document.querySelectorAll('.tool-section:last-child .tab')[0].classList.add('active');
            } else {
                document.getElementById('fileDecodeTab').classList.remove('hidden');
                document.querySelectorAll('.tool-section:last-child .tab')[1].classList.add('active');
            }
        }

        function encodeText() {
            const input = document.getElementById('encodeInput').value;
            if (!input) {
                alert('Please enter text to encode');
                return;
            }

            try {
                const encoded = btoa(unescape(encodeURIComponent(input)));
                showEncodeResult(encoded);
            } catch (e) {
                alert('Error encoding text: ' + e.message);
            }
        }

        function decodeText() {
            const input = document.getElementById('decodeInput').value;
            if (!input) {
                alert('Please enter Base64 to decode');
                return;
            }

            try {
                const decoded = decodeURIComponent(escape(atob(input)));
                showDecodeResult(decoded);
            } catch (e) {
                alert('Error decoding Base64: ' + e.message);
            }
        }

        function showEncodeResult(text) {
            const resultDiv = document.getElementById('encodeResult');
            const resultText = document.getElementById('encodeResultText');
            
            resultText.textContent = text;
            resultDiv.classList.remove('hidden');
        }

        function showDecodeResult(text) {
            const resultDiv = document.getElementById('decodeResult');
            const resultText = document.getElementById('decodeResultText');
            
            resultText.textContent = text;
            resultDiv.classList.remove('hidden');
        }

        function clearEncode() {
            document.getElementById('encodeInput').value = '';
            document.getElementById('encodeResult').classList.add('hidden');
        }

        function clearDecode() {
            document.getElementById('decodeInput').value = '';
            document.getElementById('decodeResult').classList.add('hidden');
        }

        function copyEncodeResult() {
            const text = document.getElementById('encodeResultText').textContent;
            copyToClipboard(text);
        }

        function copyDecodeResult() {
            const text = document.getElementById('decodeResultText').textContent;
            copyToClipboard(text);
        }

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            const fileInfo = document.getElementById('fileInfo');
            const encodeBtn = document.getElementById('encodeFileBtn');

            if (selectedFile) {
                fileInfo.innerHTML = `
                    <strong>File:</strong> ${selectedFile.name}<br>
                    <strong>Size:</strong> ${formatFileSize(selectedFile.size)}<br>
                    <strong>Type:</strong> ${selectedFile.type || 'Unknown'}
                `;
                fileInfo.classList.remove('hidden');
                encodeBtn.disabled = false;
            } else {
                fileInfo.classList.add('hidden');
                encodeBtn.disabled = true;
            }
        }

        function handleBase64FileSelect(event) {
            selectedBase64File = event.target.files[0];
            const fileInfo = document.getElementById('base64FileInfo');
            const decodeBtn = document.getElementById('decodeFileBtn');

            if (selectedBase64File) {
                fileInfo.innerHTML = `
                    <strong>File:</strong> ${selectedBase64File.name}<br>
                    <strong>Size:</strong> ${formatFileSize(selectedBase64File.size)}
                `;
                fileInfo.classList.remove('hidden');
                decodeBtn.disabled = false;
            } else {
                fileInfo.classList.add('hidden');
                decodeBtn.disabled = true;
            }
        }

        function encodeFile() {
            if (!selectedFile) {
                alert('Please select a file first');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result.split(',')[1];
                showFileEncodeResult(base64);
            };
            reader.onerror = function() {
                alert('Error reading file');
            };
            reader.readAsDataURL(selectedFile);
        }

        function decodeFile() {
            if (!selectedBase64File) {
                alert('Please select a Base64 file first');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const base64Content = e.target.result;
                    const decoded = atob(base64Content);
                    
                    // Try to detect if it's a data URL
                    if (base64Content.includes(',')) {
                        const [header, data] = base64Content.split(',');
                        const mimeType = header.match(/:(.*?);/)[1];
                        showFileDecodeResult(data, mimeType);
                    } else {
                        showFileDecodeResult(decoded, 'application/octet-stream');
                    }
                } catch (e) {
                    alert('Error decoding Base64 file: ' + e.message);
                }
            };
            reader.onerror = function() {
                alert('Error reading file');
            };
            reader.readAsText(selectedBase64File);
        }

        function showFileEncodeResult(base64) {
            const resultDiv = document.getElementById('fileEncodeResult');
            const resultText = document.getElementById('fileEncodeResultText');
            
            resultText.textContent = base64;
            resultDiv.classList.remove('hidden');
        }

        function showFileDecodeResult(data, mimeType) {
            const resultDiv = document.getElementById('fileDecodeResult');
            const resultText = document.getElementById('fileDecodeResultText');
            
            // Store the data for download
            window.decodedFileData = data;
            window.decodedFileMimeType = mimeType;
            
            resultText.textContent = `File decoded successfully. Ready for download (${formatFileSize(data.length)})`;
            resultDiv.classList.remove('hidden');
        }

        function downloadDecodedFile() {
            if (!window.decodedFileData) {
                alert('No decoded file data available');
                return;
            }

            const blob = new Blob([window.decodedFileData], { type: window.decodedFileMimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'decoded_file';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function copyFileEncodeResult() {
            const text = document.getElementById('fileEncodeResultText').textContent;
            copyToClipboard(text);
        }

        function clearFile() {
            document.getElementById('fileInput').value = '';
            document.getElementById('fileInfo').classList.add('hidden');
            document.getElementById('fileEncodeResult').classList.add('hidden');
            document.getElementById('encodeFileBtn').disabled = true;
            selectedFile = null;
        }

        function clearBase64File() {
            document.getElementById('base64FileInput').value = '';
            document.getElementById('base64FileInfo').classList.add('hidden');
            document.getElementById('fileDecodeResult').classList.add('hidden');
            document.getElementById('decodeFileBtn').disabled = true;
            selectedBase64File = null;
            window.decodedFileData = null;
            window.decodedFileMimeType = null;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
