<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Details</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../../assets/images/addons.png">
    
    <!-- Fonts - Optimized loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../../styles/extension-template.css">
</head>
<body>
    <div class="extension-detail">
        <!-- Loading State -->
        <div id="loading-view" class="loading-spinner">
            <div class="spinner"></div>
        </div>

        <!-- Extension Content -->
        <div id="extension-content" class="hidden">
            <!-- Hero Card -->
            <div class="extension-card">
                <div class="extension-header">
                    <div class="extension-header-main">
                        <div class="extension-price" id="extension-price">Loading...</div>
                        <h1 class="extension-title" id="extension-title">Loading...</h1>
                        <div class="extension-meta">
                            <span id="extension-version">Version: Loading...</span>
                            <span id="extension-updated">Last Updated: Loading...</span>
                        </div>
                    </div>
                    <div class="header-right">
                        <div id="action-buttons">
                            <!-- Buttons injected dynamically -->
                        </div>
                    </div>
                </div>
                
                <div class="extension-description" id="extension-description">
                    Loading...
                </div>
            </div>

            <!-- Documentation Card -->
            <div class="documentation-card" id="documentation">
                <!-- Documentation injected dynamically -->
            </div>
        </div>

        <!-- Error State -->
        <div id="error-view" class="hidden error-state">
            <h1 id="error-title">Error</h1>
            <p id="error-message">Something went wrong.</p>
        </div>
    </div>

    <script type="module">
        // Extension detail page logic
        import { getExtensionById } from '../scripts/extensions.js';

        const urlParams = new URLSearchParams(window.location.search);
        const extensionId = urlParams.get('id');

        // DOM elements
        const loadingView = document.getElementById('loading-view');
        const contentView = document.getElementById('extension-content');
        const errorView = document.getElementById('error-view');

        if (!extensionId) {
            showError('No Extension ID', 'Please provide an extension ID in the URL.');
        } else {
            loadExtension();
        }

        async function loadExtension() {
            try {
                const extension = await getExtensionById(extensionId);
                
                if (!extension) {
                    throw new Error('Extension not found');
                }

                renderExtension(extension);
                hideLoading();
            } catch (error) {
                console.error('Failed to load extension:', error);
                showError(
                    'Extension Not Found',
                    'The extension you\'re looking for doesn\'t exist or failed to load.'
                );
            }
        }

        function renderExtension(ext) {
            // Update page title
            document.title = `${ext.title} - Extension Details`;

            // Title & meta
            document.getElementById('extension-title').textContent = ext.title;
            document.getElementById('extension-version').textContent = `Version ${ext.version || '1.0.0'}`;
            document.getElementById('extension-updated').textContent = `Updated ${ext.lastUpdated || 'Recently'}`;

            // Price badge - simplified detection
            const priceText = (ext.price || 'Free').toString().trim();
            const isFree = /^(free|\$0|0)$/i.test(priceText) || !ext.price;
            
            const priceEl = document.getElementById('extension-price');
            priceEl.textContent = priceText || 'Free';
            priceEl.className = `extension-price ${isFree ? 'free' : 'paid'}`;

            // Description
            document.getElementById('extension-description').textContent = 
                ext.description || ext.subtitle || 'No description available.';

            // Action buttons - ensure container is visible
            const buttonsContainer = document.getElementById('action-buttons');
            buttonsContainer.style.display = 'flex';
            buttonsContainer.style.visibility = 'visible';
            buttonsContainer.style.zIndex = '1';
            
            const hasUrl = ext.url && ext.url !== '#';
            
            if (isFree) {
                buttonsContainer.innerHTML = `
                    <a href="${hasUrl ? ext.url : '#'}" 
                       class="action-button download-button" 
                       ${!hasUrl ? 'disabled' : ''}
                       target="_blank" rel="noopener">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download
                    </a>
                `;
            } else {
                buttonsContainer.innerHTML = `
                    <a href="${hasUrl ? ext.url : '#'}" 
                       class="action-button buy-button" 
                       ${!hasUrl ? 'disabled' : ''}
                       target="_blank" rel="noopener">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                            <line x1="1" y1="10" x2="23" y2="10"/>
                        </svg>
                        Buy Now
                    </a>
                `;
            }
            
            // Documentation
            const docContainer = document.getElementById('documentation');
            if (ext.documentation && ext.documentation.length > 0) {
                docContainer.innerHTML = ext.documentation.map(doc => `
                    <div class="documentation-section">
                        <h2 class="documentation-title">${doc.title}</h2>
                        <div class="documentation-content">${formatContent(doc.content)}</div>
                    </div>
                `).join('');
            } else {
                docContainer.innerHTML = `
                    <div class="documentation-section">
                        <p style="color: var(--text-muted); text-align: center; padding: 2rem;">
                            No documentation available for this extension.
                        </p>
                    </div>
                `;
            }
        }

        function formatContent(content) {
            // Convert newlines to paragraphs if plain text
            if (!content.includes('<')) {
                return content.split('\n\n').map(p => `<p>${p}</p>`).join('');
            }
            return content;
        }

        function hideLoading() {
            loadingView.classList.add('hidden');
            contentView.classList.remove('hidden');
        }

        function showError(title, message) {
            loadingView.classList.add('hidden');
            contentView.classList.add('hidden');
            errorView.classList.remove('hidden');
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-message').textContent = message;
        }
    </script>
</body>
</html>
