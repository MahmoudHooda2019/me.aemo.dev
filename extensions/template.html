<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Details</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../../assets/images/addons.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="../../styles/extension-template.css">
</head>
<body>
    <div class="extension-detail">
        <div id="loading-view" class="loading-spinner">
            <div class="spinner"></div>
        </div>

        <div id="extension-content" class="hidden">
            <div class="extension-card">
                <div class="extension-info">
                    <div class="extension-header">
                        <div>
                            <h1 class="extension-title" id="extension-title">Loading...</h1>
                            <div class="extension-meta">
                                <span id="extension-version">Version: Loading...</span>
                                <span id="extension-updated">Last Updated: Loading...</span>
                            </div>
                        </div>
                        <div class="header-right">
                            <div id="action-buttons">
                                <!-- Buttons will be added here dynamically -->
                            </div>
                        </div>
                    </div>

                    <div class="extension-description" id="extension-description">
                        Loading...
                    </div>
                </div>
                <div class="extension-price" id="extension-price">Loading...</div>
            </div>

            <div class="documentation-card" id="documentation">
                <!-- Documentation will be added here dynamically -->
            </div>
        </div>
    </div>

    <script type="module">
        /**
         * Sanitize a string value so it is safe to display as text content.
         * Returns a fallback string if the value is not a non-empty string.
         */
        function sanitizeText(value, fallback = '') {
            if (typeof value !== 'string' || value.trim() === '') return fallback;
            return value.trim();
        }

        /**
         * Validate a URL so only http/https schemes are accepted.
         * Returns '#' for anything else to prevent javascript: or data: URIs.
         */
        function sanitizeUrl(value) {
            if (typeof value !== 'string') return '#';
            try {
                const url = new URL(value);
                if (url.protocol !== 'https:' && url.protocol !== 'http:') return '#';
                return url.href;
            } catch {
                return '#';
            }
        }

        /**
         * Build an action button using DOM APIs (no innerHTML with untrusted data).
         */
        function buildActionButton(url, label, cssClass) {
            const safeUrl = sanitizeUrl(url);
            const a = document.createElement('a');
            a.href = safeUrl;
            a.className = `action-button ${cssClass}`;
            a.textContent = label;
            a.rel = 'noopener noreferrer';
            if (safeUrl === '#') {
                a.setAttribute('disabled', '');
                a.addEventListener('click', e => e.preventDefault());
            } else {
                a.target = '_blank';
            }
            return a;
        }

        /**
         * Build a documentation section using DOM APIs only — no innerHTML.
         */
        function buildDocSection(doc) {
            const section = document.createElement('div');
            section.className = 'documentation-section';

            const h2 = document.createElement('h2');
            h2.className = 'documentation-title';
            h2.textContent = sanitizeText(doc.title, 'Untitled Section');

            const content = document.createElement('div');
            content.className = 'documentation-content';
            // Use textContent — no HTML rendering of doc.content to prevent XSS
            content.textContent = sanitizeText(doc.content, '');

            section.appendChild(h2);
            section.appendChild(content);
            return section;
        }

        try {
            const { getExtensionById } = await import('../scripts/extensions.js');

            // Get extension data from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const extensionId = urlParams.get('id');

            // Validate the id: only allow alphanumeric, hyphen, underscore
            if (!extensionId || !/^[a-zA-Z0-9_-]+$/.test(extensionId)) {
                throw new Error('Invalid or missing extension ID');
            }

            // Load extension data
            async function loadExtensionData() {
                try {
                    const extension = await getExtensionById(extensionId);

                    if (!extension) {
                        throw new Error('Extension not found');
                    }

                    // Hide loading view and show content
                    document.getElementById('loading-view').classList.add('hidden');
                    document.getElementById('extension-content').classList.remove('hidden');

                    // Populate text fields using textContent only (safe from XSS)
                    document.getElementById('extension-title').textContent = sanitizeText(extension.title, 'Untitled');
                    document.title = sanitizeText(extension.title, 'Extension Details');
                    document.getElementById('extension-version').textContent = `Version: ${sanitizeText(extension.version, 'N/A')}`;
                    document.getElementById('extension-updated').textContent = `Last Updated: ${sanitizeText(extension.lastUpdated, 'N/A')}`;
                    document.getElementById('extension-price').textContent = sanitizeText(extension.price, 'N/A');
                    document.getElementById('extension-price').classList.add(extension.price === 'Free' ? 'free' : 'paid');
                    document.getElementById('extension-description').textContent = sanitizeText(extension.description, 'No description available.');

                    // Build action button via DOM API — never use innerHTML with extension data
                    const actionButtons = document.getElementById('action-buttons');
                    actionButtons.innerHTML = ''; // clear safely (no untrusted content here)
                    const isFree = extension.price === 'Free';
                    const btn = buildActionButton(
                        extension.url,
                        isFree ? 'Download' : 'Buy Now',
                        isFree ? 'download-button' : 'buy-button'
                    );
                    actionButtons.appendChild(btn);

                    // Build documentation sections via DOM API
                    const documentation = document.getElementById('documentation');
                    documentation.innerHTML = ''; // clear safely
                    if (Array.isArray(extension.documentation) && extension.documentation.length > 0) {
                        extension.documentation.forEach(doc => {
                            documentation.appendChild(buildDocSection(doc));
                        });
                    } else {
                        const p = document.createElement('p');
                        p.textContent = 'No documentation available.';
                        documentation.appendChild(p);
                    }

                } catch (error) {
                    // Only log the technical error to console — show a generic message to the user
                    console.error('Error loading extension data:', error);
                    document.getElementById('loading-view').classList.add('hidden');
                    document.getElementById('extension-content').classList.remove('hidden');
                    document.getElementById('extension-title').textContent = 'Error Loading Extension';
                    document.getElementById('extension-description').textContent = 'There was an error loading the extension data. Please try again later.';
                }
            }

            loadExtensionData();

        } catch (error) {
            console.error('Critical error:', error);
            document.getElementById('loading-view').classList.add('hidden');
            document.getElementById('extension-content').classList.remove('hidden');
            document.getElementById('extension-title').textContent = 'Error Loading Extension';
            document.getElementById('extension-description').textContent = 'Failed to load the extension module. Please try again later.';
        }
    </script>
</body>
</html>
